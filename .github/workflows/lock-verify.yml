name: lock-verify

# Guards against gradle.lockfile drift on Dependabot PRs. Dependabot
# regenerates the dependency lockfiles with its own Gradle toolchain, which
# has previously resolved plugin-managed transitives (e.g. the JaCoCo agent)
# to a different version than the project wrapper, producing a strict-lock
# conflict that fails `build / check` on every gradle bump.
#
# The JaCoCo tool version is now pinned explicitly in core/build.gradle.kts,
# which should keep the two toolchains in agreement. This job is the safety
# net: it re-runs `--write-locks` with the project wrapper and fails if the
# committed lockfiles differ from a clean regeneration, surfacing any future
# drift as a one-line manual fix instead of an opaque CI failure.
#
# Verify-only by design: it does not push to the PR branch (a push with the
# default GITHUB_TOKEN would not re-trigger CI). When it fails, regenerate
# locally with `./gradlew --write-locks` in core/ and push the result.

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: lock-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-locks:
    # Only Dependabot gradle PRs carry this drift risk.
    if: github.actor == 'dependabot[bot]' && startsWith(github.head_ref, 'dependabot/gradle/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Regenerate lockfiles with the project wrapper
        working-directory: core
        run: >-
          ./gradlew --no-daemon --write-locks
          dependencies
          :app:core:dependencies
          :app:cli:dependencies
          :app:config:dependencies
          :app:sync:dependencies
          :providers:onedrive:dependencies
          :providers:internxt:dependencies

      - name: Fail if committed lockfiles drifted from a clean regeneration
        run: |
          set -euo pipefail
          if ! git diff --quiet -- '**/gradle.lockfile' 'core/gradle.lockfile'; then
            echo "::error::Committed gradle.lockfile(s) differ from a clean regeneration with the project wrapper."
            echo "Dependabot's lockfile regen drifted from Gradle $(cd core && ./gradlew --version | awk '/^Gradle/{print $2}')."
            echo "Fix: run './gradlew --write-locks' in core/ locally and push the regenerated lockfiles."
            echo "--- drift ---"
            git --no-pager diff -- '**/gradle.lockfile' 'core/gradle.lockfile'
            exit 1
          fi
          echo "Lockfiles are consistent with a clean regeneration."
