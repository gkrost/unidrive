[general]
profile                = "dev"
hash_algorithm         = "SHA3-512"
sample_percentage      = 10
min_sample             = 10
max_sample             = 200
max_depth              = 4
files_per_folder       = 8
ascii_name_ratio       = 50
unicode_normalization  = "NFC"
upload_delay_ms        = 500
max_path_length        = 0
base_folder            = "unidrive-360"

[run]
run_id                  = ""
cleanup_local_after_run = true
preserve_remote_golden  = true

[encodings]
variants = [
    "UTF-8",
    "UTF-8-BOM",
    "UTF-16LE",
    "UTF-16BE",
    "UTF-32LE",
    "UTF-32BE",
    "ISO-8859-1",
    "ISO-8859-15",
    "CP1252",
    "CP437",
    "CP850",
    "Shift_JIS",
    "EUC-JP",
    "GB2312",
    "GBK",
    "GB18030",
    "Big5",
    "KOI8-R",
    "IBM500",
    "CP1047",
]

[media]
images = ["jpg", "png", "gif", "webp", "heic", "avif", "tiff", "bmp", "svg"]
video  = ["mp4", "mov", "mkv", "avi", "webm"]
audio  = ["mp3", "flac", "aac", "ogg", "wav"]
docs   = ["pdf", "docx", "xlsx", "pptx", "odt", "txt", "csv"]

[filesystem_limits]
ntfs_max_name_chars  = 255
ext4_max_name_bytes  = 255
ntfs_max_path_chars  = 32767
ext4_max_path_bytes  = 4096

[verify]
heic_verify_mode    = "size_only"
internxt_verify_via = "unidrive"

[providers.onedrive]
enabled = true
phase   = "1a"

[providers.internxt]
enabled = true
phase   = "1a"

[providers.hidrive]
enabled = false
phase   = "backlog"

[providers.s3]
enabled = false
phase   = "backlog"

[providers.sftp]
enabled = false
phase   = "backlog"

[providers.webdav]
enabled = false
phase   = "backlog"
