rules:
  - id: command-injection-unsafe-processbuilder
    languages:
      - kotlin
    message: Unsafe ProcessBuilder usage with single string argument (potential shell injection). Use array form or list of arguments.
    severity: ERROR
    patterns:
      - pattern: ProcessBuilder($CMD)
      - pattern-not: ProcessBuilder(*$ARGS)
      - pattern-not: ProcessBuilder($ARG1, $ARG2, ...)
    fix: ProcessBuilder(*$CMD.split("\\s+"))
  - id: command-injection-runtime-exec
    languages:
      - kotlin
    message: Unsafe Runtime.exec usage with single string argument (potential shell injection). Use array form.
    severity: ERROR
    patterns:
      - pattern: Runtime.getRuntime().exec($CMD)
      - pattern-not: Runtime.getRuntime().exec($ARG1, $ARG2, ...)
      - pattern-not: Runtime.getRuntime().exec($ENV, $ARG1, $ARG2, ...)
    fix: Runtime.getRuntime().exec($CMD.split("\\s+"))
